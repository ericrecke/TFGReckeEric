<main class="min-vh-100 bg-light d-flex align-items-center py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-sm-10 col-md-7 col-lg-5 col-xl-4">
        <div class="card shadow-sm border-0">
          <div class="card-body p-4 p-md-5">
            <h1 class="h3 mb-2">Crear cuenta</h1>
            <p class="text-secondary mb-4">Registrate para acceder al sistema de soporte a decisiones.</p>

            <form (ngSubmit)="register()" class="d-grid gap-3">
              <div>
                <label for="name" class="form-label">Nombre</label>
                <input
                  id="name"
                  class="form-control"
                  type="text"
                  [(ngModel)]="name"
                  name="name"
                  placeholder="Ingrese su nombre"
                  required
                />
              </div>

              <div>
                <label for="email" class="form-label">Email</label>
                <input
                  id="email"
                  class="form-control"
                  type="email"
                  [(ngModel)]="email"
                  name="email"
                  placeholder="Ingrese su email"
                  autocomplete="email"
                  required
                  email
                />
              </div>

              <div>
                <label for="password" class="form-label">Contrasena</label>
                <input
                  id="password"
                  class="form-control"
                  type="password"
                  [(ngModel)]="password"
                  name="password"
                  placeholder="Ingrese su contrasena"
                  required
                />
                <div class="form-text">
                  Minimo 8 caracteres, una mayuscula, una minuscula, un numero y un caracter especial.
                </div>
              </div>

              <div>
                <label for="confirmPassword" class="form-label">Confirmar contrasena</label>
                <input
                  id="confirmPassword"
                  class="form-control"
                  type="password"
                  [(ngModel)]="confirmPassword"
                  name="confirmPassword"
                  placeholder="Repita su contrasena"
                  required
                />
              </div>

              <div class="alert alert-danger mb-0" *ngIf="errorMessage">
                {{ errorMessage }}
              </div>

              <div class="alert alert-success mb-0" *ngIf="successMessage">
                {{ successMessage }}
              </div>

              <button type="submit" class="btn btn-primary w-100" [disabled]="loading">
                {{ loading ? 'Registrando...' : 'Registrarse' }}
              </button>
            </form>

            <p class="text-center text-secondary mt-4 mb-0">
              Ya tenes cuenta?
              <a routerLink="/login">Iniciar sesion</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>
