<main class="min-vh-100 bg-light d-flex align-items-center py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-sm-10 col-md-7 col-lg-5 col-xl-4">
        <div class="card shadow-sm border-0">
          <div class="card-body p-4 p-md-5">
            <h1 class="h3 mb-2">Iniciar sesion</h1>
            <p class="text-secondary mb-4">Accede al sistema de soporte a decisiones.</p>

            <form (ngSubmit)="login()" class="d-grid gap-3">
              <div>
                <label for="email" class="form-label">Email</label>
                <input
                  id="email"
                  class="form-control"
                  type="email"
                  [(ngModel)]="email"
                  name="email"
                  placeholder="Ingrese su email"
                />
              </div>

              <div>
                <label for="password" class="form-label">Contrasena</label>
                <input
                  id="password"
                  class="form-control"
                  type="password"
                  [(ngModel)]="password"
                  name="password"
                  placeholder="Ingrese su contrasena"
                />
              </div>

              <div class="alert alert-danger mb-0" *ngIf="errorMessage">
                {{ errorMessage }}
              </div>

              <button type="submit" class="btn btn-primary w-100" [disabled]="loading">
                {{ loading ? 'Ingresando...' : 'Ingresar' }}
              </button>
            </form>

            <p class="text-center text-secondary mt-4 mb-0">
              No tenes cuenta?
              <a routerLink="/register">Registrarse</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>
